version: 2

project_name: heplify

before:
  hooks:
    - bash scripts/update_version.sh {{ .Version }}
    - go mod tidy
    - go vet ./...

builds:
  - id: heplify
    main: ./src/cmd/heplify
    binary: heplify
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildDate={{.Date}}
      - -X main.GitCommit={{.ShortCommit}}
    flags:
      - -trimpath

  - id: heplify-static
    main: ./src/cmd/heplify
    binary: heplify-static
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -linkmode external
      - -extldflags '-static'
      - -X main.Version={{.Version}}
      - -X main.BuildDate={{.Date}}
      - -X main.GitCommit={{.ShortCommit}}
    flags:
      - -trimpath

archives:
  - id: heplify
    ids:
      - heplify
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - heplify.json
      - example.lua

  - id: heplify-static
    ids:
      - heplify-static
    name_template: "{{ .ProjectName }}_{{ .Version }}_linux_amd64_static"
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - heplify.json
      - example.lua

nfpms:
  - id: heplify-deb-rpm
    ids:
      - heplify
    package_name: heplify
    vendor: SIPCAPTURE
    homepage: https://github.com/sipcapture/heplify
    maintainer: SIPCAPTURE <support@sipcapture.org>
    description: Next-generation HEP Agent and Collector for the SIPCAPTURE ecosystem
    license: AGPL-3.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: heplify.json
        dst: /etc/heplify/heplify.json
        type: config|noreplace
      - src: example.lua
        dst: /etc/heplify/example.lua
        type: config|noreplace

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sipcapture
    name: heplify
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
