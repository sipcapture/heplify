name: Bump version.go on Release

on:
  release:
    types: [published]

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version.go
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s|var Version = \"[^\"]*\"|var Version = \"${VERSION}\"|" src/cmd/heplify/version.go
          if grep -qF "var Version = \"${VERSION}\"" src/cmd/heplify/version.go; then
            echo "Updated version.go to ${VERSION}"
            echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          else
            echo "::error::Failed to update version.go to ${VERSION}" >&2
            exit 1
          fi

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/cmd/heplify/version.go
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git pull --rebase origin ${{ github.event.repository.default_branch }}
          git push
