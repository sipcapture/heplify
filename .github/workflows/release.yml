name: Release

on:
  workflow_dispatch:
    inputs:
      ref_name:
        description: 'Release version tag (e.g. v2.0.0)'
        required: true
      release:
        description: 'Create GitHub release and packages'
        required: true
        type: boolean
        default: true
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpcap-dev libluajit-5.1-dev

      - name: Resolve version
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref_name || github.ref_name }}"
          VERSION="${TAG#v}"
          if [ -z "${VERSION}" ]; then
            echo "::error::VERSION is empty. Provide a valid tag (e.g. v2.0.0)."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Update version.go
        run: |
          ESCAPED="${VERSION//\\/\\\\}"
          ESCAPED="${ESCAPED//&/\\&}"
          sed -i "s|var Version = \"[^\"]*\"|var Version = \"${ESCAPED}\"|" src/cmd/heplify/version.go
          echo "Updated version.go to ${VERSION}"

      - name: Build heplify (${{ matrix.goarch }})
        run: |
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE}"
          CGO_ENABLED=1 go build -ldflags "${LDFLAGS}" -trimpath -o heplify_${{ matrix.goarch }} ./src/cmd/heplify
          echo "Built: $(./heplify_${{ matrix.goarch }} -version 2>&1 || true)"

      - name: Get nfpm
        if: github.event_name == 'release' || inputs.release == true
        run: |
          NFPM_ARCH="${{ matrix.goarch == 'arm64' && 'arm64' || 'x86_64' }}"
          wget -qO- "https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_Linux_${NFPM_ARCH}.tar.gz" \
            | tar --directory ./ -xz nfpm
          chmod +x nfpm

      - name: Create packages (${{ matrix.goarch }})
        if: github.event_name == 'release' || inputs.release == true
        run: |
          cp heplify_${{ matrix.goarch }} heplify
          sed -i "s|arch: \"amd64\"|arch: \"${{ matrix.goarch }}\"|g" nfpm.yaml
          VERSION="${VERSION}" ./nfpm pkg --config nfpm.yaml \
            --target "./heplify_${VERSION}_${{ matrix.goarch }}.deb"
          VERSION="${VERSION}" ./nfpm pkg --config nfpm.yaml \
            --target "./heplify_${VERSION}_${{ matrix.goarch }}.rpm"

      - name: Upload release assets
        if: github.event_name == 'release' || inputs.release == true
        uses: boxpositron/upload-multiple-releases@1.0.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_config: |
            heplify_${{ matrix.goarch }}
            heplify_${{ env.VERSION }}_${{ matrix.goarch }}.deb
            heplify_${{ env.VERSION }}_${{ matrix.goarch }}.rpm
          tag_name: ${{ env.VERSION }}
          release_name: ${{ env.VERSION }}
          draft: false
          prerelease: false
          overwrite: true
