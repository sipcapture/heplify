name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '[0-9]*.[0-9]*.[0-9]*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.1)'
        required: true

permissions:
  contents: write
  packages: write

env:
  GO_VERSION_FILE: go.mod
  IMAGE_NAME: ghcr.io/sipcapture/heplify

jobs:
  build:
    name: Build & Package (${{ matrix.goos }}/${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            goos: linux
            runner: ubuntu-latest
          - goarch: arm64
            goos: linux
            runner: ubuntu-24.04-arm
          - goarch: arm64
            goos: darwin
            runner: macos-latest
          - goarch: amd64
            goos: windows
            runner: windows-latest

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Install build dependencies (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flex bison

      - name: Install build dependencies (macOS)
        if: matrix.goos == 'darwin'
        run: |
          brew install libpcap

      - name: Install build dependencies (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $npcapUrl = "https://npcap.com/dist/npcap-sdk-1.13.zip"
          Invoke-WebRequest -Uri $npcapUrl -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath C:\npcap-sdk
          echo "CGO_CFLAGS=-IC:/npcap-sdk/Include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-LC:/npcap-sdk/Lib/x64 -lwpcap" >> $env:GITHUB_ENV

      - name: Cache local libpcap
        if: matrix.goos == 'linux'
        id: cache-libpcap
        uses: actions/cache@v4
        with:
          path: build/libpcap
          key: libpcap-1.10.4-${{ matrix.goarch }}-${{ runner.os }}

      - name: Build static libpcap
        if: matrix.goos == 'linux' && steps.cache-libpcap.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/build_libpcap.sh
          ./scripts/build_libpcap.sh

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          if [ -z "${VERSION}" ]; then
            echo "::error::VERSION is empty. Provide a valid tag (e.g. v2.0.1)."
            exit 1
          fi
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "VERSION=${VERSION}"       >> "$GITHUB_OUTPUT"
          echo "GIT_COMMIT=${GIT_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}"               >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}"       >> "$GITHUB_ENV"

      - name: Update version.go (Linux)
        if: matrix.goos == 'linux'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s|var Version = \"[^\"]*\"|var Version = \"${VERSION}\"|" src/cmd/heplify/version.go
          grep "var Version" src/cmd/heplify/version.go

      - name: Update version.go (macOS)
        if: matrix.goos == 'darwin'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i '' "s|var Version = \"[^\"]*\"|var Version = \"${VERSION}\"|" src/cmd/heplify/version.go
          grep "var Version" src/cmd/heplify/version.go

      - name: Update version.go (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $file = "src/cmd/heplify/version.go"
          (Get-Content $file) -replace 'var Version = "[^"]*"', "var Version = `"$VERSION`"" | Set-Content $file
          Select-String "var Version" $file

      - name: Build heplify (${{ matrix.goos }}/${{ matrix.goarch }})
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          GIT_COMMIT="${{ steps.version.outputs.GIT_COMMIT }}"
          BUILD_DATE="${{ steps.version.outputs.BUILD_DATE }}"
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE} -X main.GitCommit=${GIT_COMMIT}"
          EXT="${{ matrix.goos == 'windows' && '.exe' || '' }}"

          if [ "${{ matrix.goos }}" = "linux" ]; then
            CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.goarch }} \
            CGO_CFLAGS="-I$(pwd)/build/libpcap/include" \
            CGO_LDFLAGS="-L$(pwd)/build/libpcap/lib" \
            go build \
              -ldflags "${LDFLAGS} -linkmode external -extldflags '-static'" \
              -trimpath \
              -o heplify_${{ matrix.goos }}_${{ matrix.goarch }} \
              ./src/cmd/heplify
          else
            CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "${LDFLAGS}" -trimpath \
              -o heplify_${{ matrix.goos }}_${{ matrix.goarch }}${EXT} \
              ./src/cmd/heplify
          fi

          echo "=== Version dump ==="
          ./heplify_${{ matrix.goos }}_${{ matrix.goarch }}${EXT} -version
        shell: bash

      - name: Get nfpm
        if: matrix.goos == 'linux'
        run: |
          NFPM_ARCH="${{ matrix.goarch == 'arm64' && 'arm64' || 'x86_64' }}"
          wget -qO- "https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_Linux_${NFPM_ARCH}.tar.gz" \
            | tar --directory ./ -xz nfpm
          chmod +x nfpm

      - name: Create packages (${{ matrix.goarch }})
        if: matrix.goos == 'linux'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cp heplify_${{ matrix.goos }}_${{ matrix.goarch }} heplify
          echo "=== Binary type ==="
          file heplify
          ARCH="${{ matrix.goarch }}"
          sed -i "s|arch: \"amd64\"|arch: \"${ARCH}\"|g" nfpm.yaml
          VERSION="${VERSION}" ./nfpm pkg --config nfpm.yaml \
            --target "./heplify_${VERSION}_${ARCH}.deb"
          VERSION="${VERSION}" ./nfpm pkg --config nfpm.yaml \
            --target "./heplify_${VERSION}_${ARCH}.rpm"
          ls -lh heplify_*.deb heplify_*.rpm heplify_${{ matrix.goos }}_${{ matrix.goarch }}

      - name: Upload artifacts (Linux)
        if: matrix.goos == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: heplify-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1
          path: |
            heplify_${{ matrix.goos }}_${{ matrix.goarch }}
            heplify_${{ steps.version.outputs.VERSION }}_${{ matrix.goarch }}.deb
            heplify_${{ steps.version.outputs.VERSION }}_${{ matrix.goarch }}.rpm

      - name: Upload artifacts (macOS)
        if: matrix.goos == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: heplify-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1
          path: |
            heplify_${{ matrix.goos }}_${{ matrix.goarch }}

      - name: Upload artifacts (Windows)
        if: matrix.goos == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: heplify-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1
          path: |
            heplify_${{ matrix.goos }}_${{ matrix.goarch }}.exe

  docker:
    name: Docker image (${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - goarch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "VERSION=${VERSION}"       >> "$GITHUB_OUTPUT"
          echo "GIT_COMMIT=${GIT_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}"               >> "$GITHUB_OUTPUT"

      - name: Check DockerHub credentials
        id: dockerhub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push arch-specific image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-${{ matrix.goarch }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_DATE=${{ steps.version.outputs.BUILD_DATE }}
            GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}

  docker-manifest:
    name: Docker multi-arch manifest
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}"         >> "$GITHUB_OUTPUT"

      - name: Check DockerHub credentials
        id: dockerhub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest (GHCR)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${VERSION}" \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${VERSION}-amd64" \
            "${IMAGE_NAME}:${VERSION}-arm64"
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}"

      - name: Create and push multi-arch manifest (Docker Hub)
        if: steps.dockerhub.outputs.available == 'true'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          HUB_IMAGE="sipcapture/heplify"
          docker buildx imagetools create \
            --tag "${HUB_IMAGE}:${VERSION}" \
            --tag "${HUB_IMAGE}:latest" \
            "${IMAGE_NAME}:${VERSION}-amd64" \
            "${IMAGE_NAME}:${VERSION}-arm64"

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}"         >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Ensure tag exists
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Flatten artifacts
        run: |
          mkdir -p dist/flat
          find dist/ -type f -exec mv {} dist/flat/ \;
          echo "=== Release assets ==="
          ls -lh dist/flat/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "heplify v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: dist/flat/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
