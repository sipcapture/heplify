# nfpm package configuration for heplify-ng
# Used by release workflow and scripts/build_package.sh
# VERSION is passed via environment variable: VERSION=1.2.3 nfpm pkg ...

name: "heplify-ng"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "net"
priority: "optional"
replaces:
  - heplify
provides:
  - heplify-ng
maintainer: "SIPCAPTURE <support@sipcapture.org>"
description: |
  Next-generation HEP Agent and Collector for the SIPCAPTURE ecosystem.
  Captures SIP, RTCP and other VoIP traffic and forwards it via HEP protocol.
vendor: "SIPCAPTURE"
homepage: "https://github.com/sipcapture/heplify-ng"
license: "AGPL-3.0"
contents:
  - src: ./heplify-ng
    dst: /usr/local/bin/heplify-ng

  - src: ./heplify.json
    dst: /etc/heplify-ng/heplify.json
    type: config|noreplace

  - src: ./example.lua
    dst: /etc/heplify-ng/example.lua
    type: config|noreplace

  - src: ./examples/heplify-ng.service
    dst: /etc/systemd/system/heplify-ng.service

  - src: ./examples/heplify-ng.init
    dst: /etc/init.d/heplify-ng
