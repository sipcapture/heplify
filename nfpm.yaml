# nfpm package configuration for heplify
# Used by release workflow and scripts/build_package.sh
# VERSION is passed via environment variable: VERSION=1.2.3 nfpm pkg ...

name: "heplify"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "net"
priority: "optional"
replaces:
  - heplify
provides:
  - heplify
maintainer: "SIPCAPTURE <support@sipcapture.org>"
description: |
  Next-generation HEP Agent and Collector for the SIPCAPTURE ecosystem.
  Captures SIP, RTCP and other VoIP traffic and forwards it via HEP protocol.
vendor: "SIPCAPTURE"
homepage: "https://github.com/sipcapture/heplify"
license: "AGPL-3.0"
contents:
  - src: ./heplify
    dst: /usr/local/bin/heplify

  - src: ./heplify.json
    dst: /etc/heplify/heplify.json
    type: config|noreplace

  - src: ./example.lua
    dst: /etc/heplify/example.lua
    type: config|noreplace

  - src: ./examples/heplify.service
    dst: /etc/systemd/system/heplify.service

  - src: ./examples/heplify.init
    dst: /etc/init.d/heplify

  - src: ./src/promstats/stats.html
    dst: /usr/share/heplify/stats.html
    type: config|noreplace
