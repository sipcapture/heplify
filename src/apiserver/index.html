<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heplify stats</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    border-bottom: 1px solid #2d3748;
    padding-bottom: 16px;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: .03em; color: #f7fafc; }
  header h1 span { color: #4299e1; }
  #last-updated { font-size: .78rem; color: #718096; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .card {
    background: #1a202c;
    border: 1px solid #2d3748;
    border-radius: 10px;
    padding: 18px 20px;
  }
  .card .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: #718096; margin-bottom: 6px; }
  .card .value { font-size: 1.4rem; font-weight: 700; color: #f7fafc; word-break: break-all; }
  .card .sub { font-size: .78rem; color: #a0aec0; margin-top: 4px; }

  section { margin-bottom: 28px; }
  section h2 { font-size: .85rem; text-transform: uppercase; letter-spacing: .1em; color: #718096; margin-bottom: 12px; }

  table { width: 100%; border-collapse: collapse; background: #1a202c; border-radius: 10px; overflow: hidden; }
  th, td { padding: 11px 16px; text-align: left; font-size: .88rem; }
  th { background: #171e2b; color: #a0aec0; font-weight: 600; font-size: .75rem; text-transform: uppercase; letter-spacing: .07em; }
  tr:not(:last-child) td { border-bottom: 1px solid #2d3748; }
  td:last-child { text-align: right; font-variant-numeric: tabular-nums; color: #f7fafc; font-weight: 500; }
  td:first-child { color: #a0aec0; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 20px; font-size: .78rem; font-weight: 600;
  }
  .badge.ok   { background: #1c3d2e; color: #48bb78; }
  .badge.fail { background: #3d1c1c; color: #fc8181; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.ok   { background: #48bb78; }
  .dot.fail { background: #fc8181; }

  .transports { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .transport-card {
    background: #1a202c; border: 1px solid #2d3748; border-radius: 10px; padding: 16px 18px;
  }
  .transport-card .t-addr { font-size: .95rem; font-weight: 600; color: #f7fafc; margin-bottom: 8px; word-break: break-all; }
  .transport-card .t-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .transport-card .t-proto { font-size: .78rem; color: #a0aec0; }
  .transport-card .t-reconnects { font-size: .78rem; color: #718096; }
</style>
</head>
<body>
<header>
  <h1>hep<span>lify</span> &mdash; live stats</h1>
  <span id="last-updated">loading&hellip;</span>
</header>

<div class="cards" id="cards"></div>

<section>
  <h2>Packet counters</h2>
  <table id="pkt-table">
    <thead><tr><th>Protocol</th><th>Packets (total)</th></tr></thead>
    <tbody id="pkt-body"></tbody>
  </table>
</section>

<section>
  <h2>Transport</h2>
  <div class="transports" id="transports"></div>
</section>

<script>
const fmt = n => typeof n === 'number' ? n.toLocaleString() : (n ?? '—');

function renderCards(d) {
  const ifaces = (d.interfaces || []).join(', ') || '—';
  const modes  = Object.values(d.capture_modes || {}).flat().filter((v,i,a)=>a.indexOf(v)===i).join(', ') || '—';
  const items = [
    { label: 'Uptime',        value: d.uptime || '—' },
    { label: 'Node',          value: d.node_name || '—', sub: 'ID: ' + (d.node_id ?? '—') + (d.uuid ? '<br><span style="font-size:0.7em;letter-spacing:.04em;opacity:.6">' + d.uuid + '</span>' : '') },
    { label: 'Interface',     value: ifaces },
    { label: 'Capture mode',  value: modes },
    { label: 'HEP sent',      value: fmt(d.packets?.hep_sent) },
    { label: 'Duplicates',    value: fmt(d.packets?.duplicates) },
  ];
  document.getElementById('cards').innerHTML = items.map(c =>
    '<div class="card">'
    + '<div class="label">' + c.label + '</div>'
    + '<div class="value">' + c.value + '</div>'
    + (c.sub ? '<div class="sub">' + c.sub + '</div>' : '')
    + '</div>'
  ).join('');
}

function renderPackets(d) {
  const p = d.packets || {};
  const rows = [
    ['SIP',           p.sip],
    ['RTCP',          p.rtcp],
    ['RTCP (failed)', p.rtcp_fail],
    ['RTP',           p.rtp],
    ['DNS',           p.dns],
    ['LOG',           p.log],
    ['Unknown',       p.unknown],
    ['Total',         p.total],
  ];
  document.getElementById('pkt-body').innerHTML = rows.map(([name, val]) =>
    '<tr><td>' + name + '</td><td>' + fmt(val) + '</td></tr>'
  ).join('');
}

function renderTransports(d) {
  const list = d.transport || [];
  if (!list.length) {
    document.getElementById('transports').innerHTML = '<span style="color:#718096;font-size:.85rem">No transports configured.</span>';
    return;
  }
  document.getElementById('transports').innerHTML = list.map(t => {
    const ok = t.connected;
    return '<div class="transport-card">'
      + '<div class="t-addr">' + (t.addr || '—') + '</div>'
      + '<div class="t-meta">'
      + '<span class="badge ' + (ok ? 'ok' : 'fail') + '"><span class="dot ' + (ok ? 'ok' : 'fail') + '"></span>' + (ok ? 'connected' : 'disconnected') + '</span>'
      + '<span class="t-proto">' + (t.proto || '') + '</span>'
      + '<span class="t-reconnects">reconnects: ' + fmt(t.reconnects) + '</span>'
      + '</div></div>';
  }).join('');
}

async function fetchStats() {
  try {
    const r = await fetch('/api/stats');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    renderCards(d);
    renderPackets(d);
    renderTransports(d);
    document.getElementById('last-updated').textContent =
      'updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('last-updated').textContent = 'error: ' + e.message;
  }
}

fetchStats();
setInterval(fetchStats, 3000);
</script>
</body>
</html>
