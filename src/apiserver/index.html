<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heplify stats</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --bg-card:   #1a202c;
    --border:    #2d3748;
    --text:      #e2e8f0;
    --text-head: #f7fafc;
    --text-muted:#a0aec0;
    --text-dim:  #718096;
    --th-bg:     #171e2b;
    --accent:    #4299e1;
  }
  [data-theme="light"] {
    --bg:        #f0f4f8;
    --bg-card:   #ffffff;
    --border:    #cbd5e0;
    --text:      #2d3748;
    --text-head: #1a202c;
    --text-muted:#4a5568;
    --text-dim:  #718096;
    --th-bg:     #edf2f7;
    --accent:    #2b6cb0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    transition: background .2s, color .2s;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: .03em; color: var(--text-head); }
  header h1 span { color: var(--accent); }
  #last-updated { font-size: .78rem; color: var(--text-dim); }

  /* Theme toggle button */
  #theme-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: .8rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background .2s, border-color .2s;
    white-space: nowrap;
  }
  #theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    transition: background .2s, border-color .2s;
  }
  .card .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin-bottom: 6px; }
  .card .value { font-size: 1.4rem; font-weight: 700; color: var(--text-head); word-break: break-all; }
  .card .sub { font-size: .78rem; color: var(--text-muted); margin-top: 4px; }

  section { margin-bottom: 28px; }
  section h2 { font-size: .85rem; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); margin-bottom: 12px; }

  table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 10px; overflow: hidden; transition: background .2s; }
  th, td { padding: 11px 16px; text-align: left; font-size: .88rem; }
  th { background: var(--th-bg); color: var(--text-muted); font-weight: 600; font-size: .75rem; text-transform: uppercase; letter-spacing: .07em; }
  tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
  td:last-child { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-head); font-weight: 500; }
  td:first-child { color: var(--text-muted); }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 20px; font-size: .78rem; font-weight: 600;
  }
  [data-theme="dark"]  .badge.ok   { background: #1c3d2e; color: #48bb78; }
  [data-theme="dark"]  .badge.fail { background: #3d1c1c; color: #fc8181; }
  [data-theme="light"] .badge.ok   { background: #c6f6d5; color: #276749; }
  [data-theme="light"] .badge.fail { background: #fed7d7; color: #c53030; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.ok   { background: #48bb78; }
  .dot.fail { background: #fc8181; }

  .transports { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .transport-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px;
    transition: background .2s, border-color .2s;
  }
  .transport-card .t-addr { font-size: .95rem; font-weight: 600; color: var(--text-head); margin-bottom: 8px; word-break: break-all; }
  .transport-card .t-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .transport-card .t-proto { font-size: .78rem; color: var(--text-muted); }
  .transport-card .t-reconnects { font-size: .78rem; color: var(--text-dim); }
</style>
</head>
<body>
<header>
  <h1 id="page-title">hep<span>lify</span> Live Stats</h1>
  <div class="header-right">
    <button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">
      <span id="theme-icon">☀️</span> <span id="theme-label">Light</span>
    </button>
    <span id="last-updated">loading&hellip;</span>
  </div>
</header>

<div class="cards" id="cards"></div>

<section>
  <h2>Packet counters</h2>
  <table id="pkt-table">
    <thead><tr><th>Protocol</th><th>Packets (total)</th></tr></thead>
    <tbody id="pkt-body"></tbody>
  </table>
</section>

<section>
  <h2>Transport</h2>
  <div class="transports" id="transports"></div>
</section>

<script>
const fmt = n => typeof n === 'number' ? n.toLocaleString() : (n ?? '—');

// ── Theme ────────────────────────────────────────────────────────────────────
const THEME_KEY = 'heplify-theme';
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-icon').textContent  = theme === 'dark' ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = theme === 'dark' ? 'Light' : 'Dark';
  localStorage.setItem(THEME_KEY, theme);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
// Restore saved preference (default: dark)
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

// ── Render ───────────────────────────────────────────────────────────────────
function renderCards(d) {
  const ifaces = (d.interfaces || []).join(', ') || '—';
  const modes  = Object.values(d.capture_modes || {}).flat().filter((v,i,a)=>a.indexOf(v)===i).join(', ') || '—';
  const items = [
    { label: 'Uptime',        value: d.uptime || '—' },
    { label: 'Node',          value: d.node_name || '—', sub: 'ID: ' + (d.node_id ?? '—') + (d.uuid ? '<br><span style="font-size:0.7em;letter-spacing:.04em;opacity:.6">' + d.uuid + '</span>' : '') },
    { label: 'Interface',     value: ifaces },
    { label: 'Capture mode',  value: modes },
    { label: 'HEP sent',      value: fmt(d.packets?.hep_sent) },
    { label: 'Duplicates',    value: fmt(d.packets?.duplicates) },
  ];
  document.getElementById('cards').innerHTML = items.map(c =>
    '<div class="card">'
    + '<div class="label">' + c.label + '</div>'
    + '<div class="value">' + c.value + '</div>'
    + (c.sub ? '<div class="sub">' + c.sub + '</div>' : '')
    + '</div>'
  ).join('');
}

function renderPackets(d) {
  const p = d.packets || {};
  const rows = [
    ['SIP',           p.sip],
    ['RTCP',          p.rtcp],
    ['RTCP (failed)', p.rtcp_fail],
    ['RTP',           p.rtp],
    ['DNS',           p.dns],
    ['LOG',           p.log],
    ['Unknown',       p.unknown],
    ['Total',         p.total],
  ];
  document.getElementById('pkt-body').innerHTML = rows.map(([name, val]) =>
    '<tr><td>' + name + '</td><td>' + fmt(val) + '</td></tr>'
  ).join('');
}

function renderTransports(d) {
  const list = d.transport || [];
  if (!list.length) {
    document.getElementById('transports').innerHTML = '<span style="color:var(--text-dim);font-size:.85rem">No transports configured.</span>';
    return;
  }
  document.getElementById('transports').innerHTML = list.map(t => {
    const ok = t.connected;
    return '<div class="transport-card">'
      + '<div class="t-addr">' + (t.addr || '—') + '</div>'
      + '<div class="t-meta">'
      + '<span class="badge ' + (ok ? 'ok' : 'fail') + '"><span class="dot ' + (ok ? 'ok' : 'fail') + '"></span>' + (ok ? 'connected' : 'disconnected') + '</span>'
      + '<span class="t-proto">' + (t.proto || '') + '</span>'
      + '<span class="t-reconnects">reconnects: ' + fmt(t.reconnects) + '</span>'
      + '<span class="t-reconnects">sent: ' + fmt(t.sent) + '</span>'
      + '<span class="t-reconnects" style="color:' + (t.errors > 0 ? '#fc8181' : 'inherit') + '">errors: ' + fmt(t.errors) + '</span>'
      + '</div></div>';
  }).join('');
}

async function fetchStats() {
  try {
    const r = await fetch('/api/stats');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    renderCards(d);
    renderPackets(d);
    renderTransports(d);
    const node = d.node_name || 'heplify';
    const uuid = d.uuid  || '';
    const titleText = uuid ? node + ' ' + uuid : node;
    document.getElementById('page-title').innerHTML =
      'hep<span>lify</span> <span style="color:var(--text-dim);font-weight:400;font-size:.85em">' + titleText + '</span> <span style="color:var(--accent);font-size:.8em">Live Stats</span>';
    document.title = 'heplify ' + titleText;
    document.getElementById('last-updated').textContent =
      'updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('last-updated').textContent = 'error: ' + e.message;
  }
}

fetchStats();
setInterval(fetchStats, 3000);
</script>
</body>
</html>
